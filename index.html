<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KORVIL - Site</title>
<style>
:root{--verde:#008080;--preto:#000;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--preto);color:#fff;overflow:hidden;}
.top{position:fixed;top:0;left:0;right:0;height:70px;background:var(--verde);color:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;z-index:10;font-weight:700;}
.top button{background:transparent;border:1px solid #000;color:#000;padding:6px 22px;border-radius:4px;margin-top:5px;font-size:14px;cursor:pointer;}
.menu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--preto);padding-top:15px;overflow-y:auto;z-index:101;transition:left .3s;border-right:1px solid #222;}
.menu.ativo{left:0;}
.menu .fechar{font-size:28px;padding:5px 20px;cursor:pointer;line-height:1;color:#fff;}
.menu a{display:block;color:#fff;text-decoration:none;padding:12px 20px;font-size:15px;cursor:pointer;}
.menu a:active{background:#111;}
.menu .t{font-weight:bold;margin-top:8px;font-size:16px;}
.menu .sub{padding-left:35px;font-size:14px;color:#ddd;}
.menu .sub2{padding-left:50px;font-size:13px;color:#bbb;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:none;z-index:100;}
.overlay.ativo{display:block;}
.tela{position:absolute;top:70px;left:0;right:0;bottom:0;overflow-y:auto;padding:20px;display:none;background:var(--preto);}
.tela.ativa{display:block;text-align:center;}
h1{color:var(--verde);font-size:22px;margin:15px 0;}
p{color:#ccc;font-size:14px;}
</style>
</head>
<body>

<div class="top">você está em KORVIL - Site
