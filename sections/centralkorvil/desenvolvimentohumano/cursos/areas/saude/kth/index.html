<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>K-TH v14</title>
<style>
:root{--bg:#06070b;--panel:#0d1017;--card:#11141d;--text:#eaf6ff;--muted:#7d8aa1;--neon:#00ffff;--ok:#00ff88;--err:#ff3366;--border:#1a2030}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px Arial}
header{position:sticky;top:0;background:#06070b;border-bottom:1px solid var(--border);z-index:999}
.topbar{display:flex;gap:12px;padding:10px}
.logo{color:var(--neon);font-weight:900;font-size:18px}
.wrap{display:grid;grid-template-columns:340px 1fr}
@media(max-width:1100px){.wrap{grid-template-columns:1fr} aside{position:fixed;inset:52px 0 0 0;width:88%;background:var(--panel);transform:translateX(-100%);transition:.3s;z-index:998}}
aside{height:calc(100vh - 52px);position:sticky;top:52px;overflow:auto;padding:12px}
main{padding:0} /* SEM ESPAÇO */
.menu-btn{display:none;padding:8px;border:1px solid var(--border);background:#0a0d14;color:var(--neon);border-radius:8px}
@media(max-width:1100px){.menu-btn{display:block}}
.overlay{display:none;position:fixed;inset:0;background:#0008;z-index:997}
.overlay.show{display:block}
.tabs{display:flex;gap:8px;padding:10px;border-bottom:1px solid var(--border)}
.tab{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:#0b0e15;color:var(--muted);font-weight:700;cursor:pointer}
.tab.active{border-color:var(--neon);color:var(--neon)}
.course-title{border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px}
.course-title h1{font-size:16px;color:var(--neon);margin:0}
.stat{font-size:12px;color:var(--muted)}
.modulo{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;background:#0b0e15;overflow:hidden}
.modulo-head{padding:12px;display:flex;justify-content:space-between;cursor:pointer;font-weight:600}
.modulo-head span{font-size:12px;color:var(--muted)}
.aulas{display:none;padding:6px 8px;background:#0a0d14}
.modulo.open.aulas{display:block}
.aula{padding:8px;margin:4px 0;background:#0d111a;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid transparent;color:var(--muted)}
.aula.locked{opacity:.3;pointer-events:none}
.aula.completed{border-color:var(--ok);color:var(--ok)}
.aula.active{border-color:var(--neon);color:var(--neon)}
.player{border:1px solid var(--border);margin:0}
.video-wrap{position:relative;padding-top:56.25%;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.content{padding:14px}
.chips{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.chip{font-size:11px;padding:6px 10px;border:1px solid var(--neon);border-radius:20px;color:var(--neon)}
h2{color:var(--neon);font-size:18px;margin:0 0 10px}
.tema-nav{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.tema-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#0b0e15;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600}
.tema-btn.active{border-color:var(--neon);color:var(--neon)}
.pagina-nav{display:flex;gap:6px;margin:10px 0}
.p-btn{padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:#0a0d14;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600}
.p-btn.active{border-color:var(--neon);color:var(--neon)}
.pagina{margin-top:12px;padding:14px;border:1px solid var(--border);border-radius:10px;background:#0b0e15}
.pagina h4{color:var(--neon);font-size:15px;margin:0 0 8px}
.avaliacao{border:2px solid var(--neon);padding:16px;margin-top:16px;border-radius:12px;background:#0a0f14}
.avaliacao h3{color:var(--neon);font-size:15px;margin:0 0 8px}
.questao{border:1px solid var(--border);padding:12px;margin:12px 0;border-radius:8px;background:#0b0e15}
.questao p{font-weight:600;margin:0 0 8px}
.opcao{border:1px solid var(--border);padding:8px;margin:6px 0;border-radius:6px;background:#0a0d14;cursor:pointer}
.opcao.selecionada{border-color:var(--neon)}
.opcao.correta{border-color:var(--ok);background:#0a1a14}
.opcao.errada{border-color:var(--err);background:#1a0a0f}
.resultado{padding:10px;margin-top:10px;border-radius:8px;text-align:center;font-weight:700}
.resultado.aprovado{border:1px solid var(--ok);color:var(--ok);background:#0a1a14}
.resultado.reprovado{border:1px solid var(--err);color:var(--err);background:#1a0a0f}
.navfooter{display:flex;justify-content:space-between;padding:12px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#0b0e15}
.btn{padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:#0a0d14;color:var(--text);font-weight:700;cursor:pointer}
.btn.primary{background:var(--neon);color:#000;border:0}
.btn:disabled{opacity:.3}
</style>
</head>
<body>
<header><div class="topbar"><button class="menu-btn" id="m">☰</button><div class="logo">KORVIL</div><div style="color:var(--muted);font-size:12px">Cursos > Saúde > K-TH</div></div></header>
<div class="overlay" id="o"></div>
<div class="wrap">
<aside id="s"><div class="course-title"><h1>K-TH Formação</h1><div class="stat">11 Módulos • 55 Aulas</div></div><div id="menu"></div></aside>
<main>
<div class="tabs"><div class="tab active" id="t1">Cronograma</div><div class="tab" id="t2">Aula</div></div>
<div id="c1" style="padding:12px"><h2 style="color:var(--neon)">Cronograma K-TH</h2><p style="color:var(--muted)">M1 M2 M3 M4 M5 M6 M7 M8 M9 M10 M11</p></div>
<div id="c2" style="display:none"><div class="player"><div class="video-wrap" id="v">[Selecione]</div><div class="content" id="c"><div class="chips"><span class="chip">Selecione</span></div><h2>Bem-vindo</h2></div><div class="navfooter"><button class="btn" id="ant" disabled>← Anterior</button><button class="btn primary" id="con" disabled>✓ Concluir</button><button class="btn primary" id="prox" disabled>Próxima →</button></div></div></div>
</main></div>
<script>
const D={1:{n:"Módulo 1: Massoterapia Profissional",y:"j3PdVh1j7e0",a:[{n:"Aula 1: História da Massoterapia",t:["Tema 1: Origens","Tema 2: Evolução","Tema 3: Mestres","Tema 4: Brasil","Tema 5: Tendências"]},{n:"Aula 2: Anatomia",t:["Tema 1: Muscular","Tema 2: Esquelético","Tema 3: Circulatório","Tema 4: Nervoso","Tema 5: Pele"]},{n:"Aula 3: Biossegurança",t:["Tema 1: Higiene","Tema 2: EPIs","Tema 3: Desinfecção","Tema 4: Resíduos","Tema 5: Riscos"]},{n:"Aula 4: Anamnese",t:["Tema 1: Entrevista","Tema 2: Histórico","Tema 3: Contraindicações","Tema 4: Ficha","Tema 5: Ética"]},{n:"Aula 5: Relaxante",t:["Tema 1: Básicas","Tema 2: Deslizamento","Tema 3: Amassamento","Tema 4: Percussão","Tema 5: Finalização"]}]},2:{n:"Módulo 2: Cuidador Idosos",y:"k4_RvR3QZ8k",a:[{n:"Aula 1: Envelhecimento",t:["Tema 1: Processo","Tema 2: Biológico","Tema 3: Psicológico","Tema 4: Social","Tema 5: Mitos"]},{n:"Aula 2: Higiene",t:["Tema 1: Banho","Tema 2: Bucal","Tema 3: Roupas","Tema 4: Pele","Tema 5: Escaras"]},{n:"Aula 3: Alimentação",t:["Tema 1: Dieta","Tema 2: Hidratação","Tema 3: Deglutição","Tema 4: Especiais","Tema 5: Rotina"]},{n:"Aula 4: Mobilização",t:["Tema 1: Decúbito","Tema 2: Transferência","Tema 3: Deambulação","Tema 4: Andador","Tema 5: Quedas"]},{n:"Aula 5: Medicamentos",t:["Tema 1: Tipos","Tema 2: Vias","Tema 3: Doses","Tema 4: Efeitos","Tema 5: Limites"]}]}};
for(let m=3;m<=11;m++){D[m]={n:`Módulo ${m}: Módulo ${m}`,y:"j3PdVh1j7e0",a:[]};for(let a=1;a<=5;a++){D[m].a.push({n:`Aula ${a}: Aula ${a}`,t:["Tema 1: T1","Tema 2: T2","Tema 3: T3","Tema 4: T4","Tema 5: T5"]})}}
const Q={1:[{q:"1. Pai da massoterapia?",o:["Per Henrik Ling","Hipócrates","Galeno","Avicena"],r:0},{q:"2. Relaxante atua no?",o:["Digestivo","Nervoso","Circulatório","Respiratório"],r:1},{q:"3. Biossegurança?",o:["Força","Prevenir riscos","Óleo caro","Mais clientes"],r:1},{q:"4. Anamnese?",o:["Massagem","Entrevista","Óleo","Equip"],r:1},{q:"5. Contraindicação?",o:["Estresse","Febre alta","Cansaço","Dor"],r:1}],2:[{q:"1. Envelhecimento?",o:["Patológico","Natural","Doença","Evitar"],r:1},{q:"2. Prevenir escaras?",o:["Leito","2h decúbito","Sem água","Prender"],r:1},{q:"3. Água idoso?",o:["2L","Se pedir","500ml","Nada"],r:0},{q:"4. Dar remédio?",o:["Cuidador","Enfermeiro","Vizinho","Qualquer"],r:1},{q:"5. Prevenir quedas?",o:["Bagunça","Tapete","Seguro","Escuro"],r:2}]};
for(let i=3;i<=11;i++){Q[i]=Q[1]}
let E={a:null,t:1,p:1,r:{},c:JSON.parse(localStorage.k14||'[]'),to:JSON.parse(localStorage.k14t||'{}')};
const $=x=>document.querySelector(x),$$=x=>document.querySelectorAll(x);
function M(){let h='';Object.keys(D).forEach(m=>{let a='';D[m].a.forEach((x,i)=>{let id=`M${m}-A${i+1}`,ok=E.c.includes(id);a+=`<div class="aula locked ${ok?'completed':''}" data="${id}">${i+1}. ${x.n}</div>`});let ok=D[m].a.filter((_,i)=>E.c.includes(`M${m}-A${i+1}`)).length;h+=`<div class="modulo" id="m${m}"><div class="modulo-head">${D[m].n}<span>${ok}/5</span></div><div class="aulas">${a}</div></div>`});$('#menu').innerHTML=h;$$('.modulo-head').forEach(x=>x.onclick=()=>x.parentElement.classList.toggle('open'));$$('.aula').forEach(x=>x.onclick=()=>!x.classList.contains('locked')&&A(x.dataset))}

function X(p){E.p=p;$$('.p-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));P()}
function P(){let[m,a]=E.a.replace('M','').split('-A').map(Number),d=D[m],x=d.a[a-1],t=x.t[E.t-1],n=['Objetivo','Materiais','Preparação','Execução','Finalização'];let h='';for(let p=1;p<=5;p++){let e='';if(p===5&&E.t===5&&!E.c.includes(E.a)){e=`<div class="avaliacao"><h3>📝 Avaliação: ${t}</h3><p>70% para liberar. Sem limite.</p><div id="q"></div><button class="btn primary" id="env">Enviar</button><div id="res"></div></div>`}h+=`<div class="pagina" style="display:${p===E.p?'block':'none'}"><h4>Página ${p}: ${n[p-1]}</h4><p>${d.n} > ${x.n} > ${t} > Página ${p}: ${n[p-1]}</p>${e}</div>`}let b='<div class="pagina-nav">';for(let p=1;p<=5;p++){b+=`<button class="p-btn ${p===E.p?'active':''}" data="${p}">${p}</button>`}b+='</div>';$('#pa').innerHTML=b+;$$('.p-btn').forEach(z=>z.onclick=()=>X(+z.dataset));if($('#env'))C(m)}
function C(m){let q=Q[m],h='';q.forEach((x,i)=>{h+=`<div class="questao"><p>${x.q}</p>`;x.o.forEach((o,j)=>h+=`<div class="opcao" data-q="${i}" data-o="${j}">${String.fromCharCode(65+j)}) ${o}</div>`);h+='</div>'});$('#q').innerHTML=h;$$('.opcao').forEach(o=>o.onclick=()=>{let qi=+o.dataset.q,oi=+o.dataset.o;E.r[qi]=oi;$$('.opcao[data-q="'+qi+'"]').forEach(z=>z.classList.remove('selecionada'));o.classList.add('selecionada')});$('#env').onclick=F}

function J(){if(!E.a)return;if(!E.c.includes(E.a))E.c.push(E.a);localStorage.k14=JSON.stringify(E.c);M()}
function N(){let[m,a]=E.a.replace('M','').split('-A').map(Number),i=(m-1)*5+(a-1);if(i<54)A(`M${Math.floor((i+1)/5)+1}-A${(i+1)%5+1}`)}

function S(n){$$('.tab').forEach(t=>t.classList.remove('active'));$('#t'+n).classList.add('active');$('#c1').style.display=n===1?'block':'none';$('#c2').style.display=n===2?'block':'none'}

</html>
